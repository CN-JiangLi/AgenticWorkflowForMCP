            - API/接口类 → 结合 Codegraph 现有实现 + P0 上下文 + 需求推理

            - UI/表格/布局 → 基于 P0 + Codegraph + 需求推理（无 Elements）

            - Bug/报错 → systematic-debugging 思路：证据→假设→验证→修复，调用链以 Codegraph 为准

