    - data:
        code: "import re\n\ndef main(question: str) -> dict:\n    q = (question or\
          \ \"\").strip()\n    tokens = re.findall(\n        r'`([^`]+)`|([A-Z][a-zA-Z0-9]+(?:[A-Z][a-zA-Z0-9]+)+)|([a-zA-Z_][a-zA-Z0-9_]{2,})',\n\
          \        q,\n    )\n    terms = []\n    for groups in tokens:\n        for\
          \ g in groups:\n            if g and len(g) >= 3 and g not in terms:\n \
          \               terms.append(g)\n    if terms:\n        q = \" \".join(terms[:6])\n\
          \    elif len(q) > 200:\n        q = q[:200]\n    return {\"query\": q}\n"
